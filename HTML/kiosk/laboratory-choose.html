<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../CSS/global.css">
    <link rel="stylesheet" href="../../CSS/kiosk/laboratory-choose.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <title>Choose Laboratory</title>
</head>
<body>

    <div class="kiosk__page">

        <div class="kiosk__logo">
            <img src="/assets/logo.png" alt="UMLab">
        </div>

        <button class="kiosk__back-btn" onclick="history.back()">
            <img src="/assets/back.png" alt="Back">
        </button>

            <div class="kiosk__center">
                <h1 class="kiosk__title">Choose One Laboratory</h1>

                <div class="lab__grid">
                    <button class="lab__btn" onclick="window.location.href='pickequipment.html'">PHYSICS</button>
                    <button class="lab__btn" onclick="window.location.href='pickequipment.html'">BIOLOGY</button>
                    <button class="lab__btn" onclick="window.location.href='pickequipment.html'">CIVIL</button>
                    <button class="lab__btn" onclick="window.location.href='pickequipment.html'">CHEMISTRY</button>
                    <button class="lab__btn" onclick="window.location.href='pickequipment.html'">CULINARY</button>
                    <button class="lab__btn" onclick="window.location.href='pickequipment.html'">ELECTRICAL</button>
                    <button class="lab__btn" onclick="window.location.href='pickequipment.html'">MECHANICAL</button>
                    <button class="lab__btn" onclick="window.location.href='pickequipment.html'">HYDROLIC</button>
                </div>
            </div>

    </div>

</body>
</html>
