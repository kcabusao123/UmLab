<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/global.css">
    <link rel="stylesheet" href="../CSS/sidebar.css">
    <link rel="stylesheet" href="../CSS/dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Ubuntu+Sans:ital,wght@0,100..800;1,100..800&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Dashboard</title>
</head>
<body>

    <div class="app__container">

        <!-- ===== SIDEBAR ===== -->
        <div id="sidebar-container"></div>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="main__content">

            <!-- Header -->
            <div class="main__header">
                <div class="header__title">
                    <i class="fa-regular fa-rectangle-list"></i>
                    <h1>Dashboard - Physics Laboratory</h1>
                </div>
                <div class="header__filter">
                    <i class="fa-solid fa-sliders"></i>
                    <select class="filter__select">
                        <option value="morning">Morning</option>
                        <option value="afternoon">Afternoon</option>
                        <option value="evening">Evening</option>
                    </select>
                </div>
            </div>

            <div class="session__label__header">
                <p class="session__label">Morning</p>
                <p class="session__label">Afternoon</p>
                <p class="session__label">Evening</p>
            </div>

            <!-- Cards Grid -->
            <div class="cards__grid">

                <!-- SINGLE CARD — loop this for backend -->
                <div class="schedule__card">
                    <div class="card__header">
                        <span class="card__professor">Prof/Engr. John Doe</span>
                        <span class="card__schedule">10011</span>
                        <span class="card__time"></span>
                    </div>
                    <div class="card__body">
                        <span class="card__hours-label">Total hours:</span>
                        <span class="card__hours-value">24 HOURS</span>
                    </div>
                    <div class="card__footer">
                        <span class="card__status">Status: <span class="status__value">Pending</span></span>
                        <div class="card__actions">
                            <button class="btn__present">Present</button>
                            <button class="btn__absent">Absent</button>
                        </div>
                    </div>
                </div>
                <!-- END CARD -->

            </div>
        </main>
    </div>

</body>
</html>

<script>
    fetch('sidebar.html')
        .then(res => res.text())
        .then(html => {
            document.getElementById('sidebar-container').innerHTML = html;
            // Set active nav item
            const active = document.querySelector('.nav__item[data-page="dashboard"]');
            if (active) active.classList.add('active');
        });
</script>
